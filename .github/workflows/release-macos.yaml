name: Bundle and Release - macOS
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Compile
        run: cargo build --release
      - name: Codesign app
        run: |
          APP="target/release/fff-gpui"
          codesign --deep --force --sign - "$APP"
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: fff-gpui
          path: target/release/fff-gpui
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" target/release/fff-gpui --generate-notes
